[[language]]
name = "python"
language-servers = ["ruff", "ty"]

[[language]]
name = "go"
language-servers = ["gopls"]

[[language]]
name = "rust"
language-servers = ["rust-analyzer"]

[[language]]
name = "javascript"
language-servers = ["typescript-language-server"]

[[language]]
name = "jsx"
language-servers = ["typescript-language-server"]

[[language]]
name = "typescript"
language-servers = ["typescript-language-server"]

[[language]]
name = "tsx"
language-servers = ["typescript-language-server"]

[[language]]
name = "lua"
language-servers = ["lua-language-server"]

[[language]]
name = "html"
language-servers = ["vscode-html-language-server", "emmet-ls"]

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]

[[language]]
name = "scss"
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]

[[language]]
name = "json"
language-servers = ["vscode-json-language-server"]

[[language]]
name = "yaml"
language-servers = ["yaml-language-server"]

[[language]]
name = "hcl"
language-servers = ["terraform-ls", "tflint"]

[[language]]
name = "tfvars"
language-servers = ["terraform-ls", "tflint"]

[[language]]
name = "typst"
language-servers = ["tinymist"]

[language-server.ty]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/ty\" server"]

[language-server.ruff]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/ruff\" server"]

[language-server.gopls]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/gopls\""]

[language-server.rust-analyzer]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/rust-analyzer\""]

[language-server.typescript-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/typescript-language-server\" --stdio"]

[language-server.lua-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/lua-language-server\""]

[language-server.vscode-html-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/vscode-html-language-server\" --stdio"]

[language-server.vscode-css-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/vscode-css-language-server\" --stdio"]

[language-server.vscode-json-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/vscode-json-language-server\" --stdio"]

[language-server.yaml-language-server]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/yaml-language-server\" --stdio"]

[language-server.terraform-ls]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/terraform-ls\" serve"]

[language-server.tflint]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/tflint\" --langserver"]

[language-server.tinymist]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/tinymist\""]

[language-server.tailwindcss-ls]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/tailwindcss-language-server\" --stdio"]

[language-server.emmet-ls]
command = "sh"
args = ["-lc", "exec \"$HOME/.local/share/nvim/mason/bin/emmet-language-server\" --stdio"]
