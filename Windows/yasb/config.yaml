# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

# Configuration generated by YASB Setup Wizard.
# For more information, visit https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens:
    - '*'
    class_name: yasb-bar
    alignment:
      position: top
      align: center
    animation:
      enabled: true
      duration: 300
    blur_effect:
      enabled: false
      round_corners: true
      round_corners_type: normal
      border_color: system
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: 100%
      height: 34
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
      - komorebi_workspaces
      - quick_launch
      - media
      - cpu
      - gpu
      - memory
      center:
      - window_switcher
      - active_window
      right:
      - notifications
      - wifi
      - language
      - bluetooth
      - microphone
      - volume
      - systray
      - battery
      - clock
      - power_menu
widgets:
  home:
    type: yasb.home.HomeWidget
    options:
      label: "<span>\uE8A9</span>"
      menu_list:
      - title: User Home
        path: '~'
      - title: Download
        path: ~\Downloads
      - title: Documents
        path: ~\Documents
      - title: Pictures
        path: ~\Pictures
      system_menu: true
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: normal
      border_color: System
      alignment: left
      offset_left: -12
  clock:
    type: yasb.clock.ClockWidget
    options:
      label: '{%Y/%m/%d %H:%M}'
      label_alt: '{%a, %d %b %Y %H:%M}'
      timezones: []
      calendar:
        blur: true
        round_corners: true
        alignment: center
        direction: down
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: toggle_calendar
        on_middle: toggle_label
        on_right: context_menu
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: <span>{icon}</span>
      label_alt: <span>{icon}</span>{level}
      tooltip: true
      icons:
        muted: "\uE74F"
        '10': "\uE992"
        '30': "\uE993"
        '60': "\uE994"
        '100': "\uE995"
      callbacks:
        on_left: toggle_volume_menu
        on_right: toggle_mute
      audio_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: down
        show_apps: true
        show_app_labels: false
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uE972"
          toggle_up: "\uE971"
  notifications:
    type: yasb.notifications.NotificationsWidget
    options:
      label: "<span>\uF2A5</span>"
      label_alt: '{count} notifications'
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: toggle_notification
        on_right: do_nothing
        on_middle: do_nothing
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "<span>\uE712</span>"
      uptime: true
      show_user: true
      menu_style: popup
      popup:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        offset_left: 12
      profile_image_size: 64
      buttons:
        lock:
        - "\U000F0341"
        - Lock
        signout:
        - "\U000F0343"
        - Sign out
        sleep:
        - "\U000F0904"
        - Sleep
        hibernate:
        - "\U000F0901"
        - Hibernate
        restart:
        - "\U000F0453"
        - Restart
        shutdown:
        - "\U000F0906"
        - Shut Down
        cancel:
        - ''
        - Cancel
  komorebi_control:
    type: komorebi.control.KomorebiControlWidget
    options:
      label: "<span>\uEAD3</span>"
      run_ahk: false
      run_whkd: false
      run_masir: false
      show_version: true
      komorebi_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: left
        direction: down
        offset_top: 6
        offset_left: 0
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: do_nothing
  komorebi_workspaces:
    type: komorebi.workspaces.WorkspaceWidget
    options:
      label_workspace_btn: '{index}'
      label_workspace_active_btn: '{index}'
      label_workspace_populated_btn: '{index}'
      label_default_name: '{index}'
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: true
  cpu:
    type: yasb.cpu.CpuWidget
    options:
      label: "<span>\uF2DB</span> {info[percent][total]}%"
      label_alt: "<span>\uF2DB</span> {info[percent][total]}% | {info[freq][current]} MHz"
      update_interval: 2000
      hide_decimal: true
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
      callbacks:
        on_left: toggle_menu
        on_right: toggle_menu
  gpu:
    type: yasb.gpu.GpuWidget
    options:
      label: "<span>\uF4BC</span> {info[utilization]}% {info[temp]}\u00B0C"
      label_alt: "<span>\uF4BC</span> {info[temp]}\u00B0C | VRAM {info[mem_used]}/{info[mem_total]}"
      update_interval: 2000
      hide_decimal: true
      gpu_index: 0
      callbacks:
        on_left: toggle_menu
        on_right: toggle_menu
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
  wifi:
    type: yasb.wifi.WifiWidget
    options:
      label: '<span>{wifi_icon}</span>'
      label_alt: '<span>{wifi_icon}</span>'
      update_interval: 5000
      callbacks:
        on_left: toggle_menu
        on_middle: exec cmd.exe /c start ms-settings:network
        on_right: toggle_menu
      ethernet_label: '<span>{wifi_icon}</span>'
      ethernet_label_alt: '<span>{wifi_icon}</span>{ip_addr}'
      ethernet_icon: "\uEBA9"
      get_exact_wifi_strength: false
      wifi_icons:
      - "\U000F092E"
      - "\U000F091F"
      - "\U000F0922"
      - "\U000F0925"
      - "\U000F0928"
      menu_config:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        direction: down
        offset_top: 6
        offset_left: 0
        wifi_icons_secured:
        - "\uE670"
        - "\uE671"
        - "\uE672"
        - "\uE673"
        wifi_icons_unsecured:
        - "\uEC3C"
        - "\uEC3D"
        - "\uEC3E"
        - "\uEC3F"
  language:
    type: yasb.language.LanguageWidget
    options:
      label: "{lang[language_code]}-{lang[country_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 5
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      language_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_layout_icon: true
        layout_icon: "\uf11c"
  bluetooth:
    type: yasb.bluetooth.BluetoothWidget
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span> {device_name}"
      label_no_device: "No devices connected"
      label_device_separator: ", "
      max_length: 14
      max_length_ellipsis: "..."
      tooltip: true
      icons:
        bluetooth_on: "\U000F00AF"
        bluetooth_off: "\U000F00B2"
        bluetooth_connected: "\U000F00B1"
      device_aliases: []
      callbacks:
        on_left: toggle_label
        on_right: exec cmd.exe /c start ms-settings:bluetooth
  battery:
    type: yasb.battery.BatteryWidget
    options:
      label: "<span>{icon}</span> {percent}%"
      label_alt: "<span>{icon}</span> {percent}%"
      update_interval: 5000
      time_remaining_natural: false
      hide_unsupported: true
      charging_options:
        icon_format: '{charging_icon}'
        blink_charging_icon: true
        blink_interval: 500
      status_thresholds:
        critical: 10
        low: 25
        medium: 75
        high: 95
        full: 100
      status_icons:
        icon_charging: "\uf0e7"
        icon_critical: "\uf244"
        icon_low: "\uf243"
        icon_medium: "\uf242"
        icon_high: "\uf241"
        icon_full: "\uf240"
  launchpad:
    type: yasb.launchpad.LaunchpadWidget
    options:
      label: "<span>\uE71E</span>"
      search_placeholder: Search applications...
      app_icon_size: 48
      group_apps: false
      window:
        fullscreen: false
        width: 900
        height: 600
        overlay_block: true
      window_style:
        enable_blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
      callbacks:
        on_left: toggle_launchpad
        on_right: do_nothing
        on_middle: do_nothing
  taskbar:
    type: yasb.taskbar.TaskbarWidget
    options:
      icon_size: 16
      tooltip: true
      show_only_visible: false
      strict_filtering: true
      monitor_exclusive: false
      hide_empty: true
      title_label:
        enabled: false
        show: focused
        min_length: 10
        max_length: 30
      ignore_apps:
        processes: []
        titles: []
        classes: []
      callbacks:
        on_left: toggle_window
        on_right: context_menu
  memory:
    type: yasb.memory.MemoryWidget
    options:
      label: "<span>\uF1C0</span> {virtual_mem_percent}%"
      label_alt: "<span>\uF1C0</span> {virtual_mem_percent}% | free {virtual_mem_free} | swap {swap_mem_percent}%"
      update_interval: 5000
      hide_decimal: true
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: toggle_menu
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
  hardware_grouper:
    type: yasb.grouper.GrouperWidget
    options:
      class_name: hardware-grouper
      widgets:
      - cpu
      - gpu
      - memory
      hide_empty: true
      collapse_options:
        enabled: true
        exclude_widgets:
        - cpu
        expanded_label: "\uE972"
        collapsed_label: "\uE971"
        label_position: right
      keybindings:
      - keys: ctrl+alt+h
        action: toggle_collapse
  quick_launch:
    type: yasb.quick_launch.QuickLaunchWidget
    options:
      label: "<span>\uf002</span>"
      search_placeholder: Search applications...
      max_results: 50
      show_icons: true
      icon_size: 32
      compact_text: true
      providers:
        apps:
          enabled: true
          prefix: '*'
          priority: 0
          show_recent: true
          max_recent: 5
          show_description: true
        calculator:
          enabled: true
          prefix: "="
          priority: 2
        clipboard_history:
          enabled: true
          prefix: "cb"
          priority: 3
          max_items: 30
        currency:
          enabled: true
          prefix: "$"
          priority: 5
        file_search:
          enabled: true
          prefix: "/"
          priority: 8
          backend: "auto"
          show_path: true
        unit_converter:
          enabled: true
          prefix: "~"
          priority: 17
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        dark_mode: true
      callbacks:
        on_left: toggle_quick_launch
      keybindings:
      - keys: alt+space
        action: toggle_quick_launch
        screen: primary
  active_window:
    type: yasb.active_window.ActiveWindowWidget
    options:
      label: '{win[title]}'
      label_alt: '{win[title]}'
      label_no_window: ''
      label_icon: true
      label_icon_size: 16
      max_length: 32
      max_length_ellipsis: '...'
      monitor_exclusive: false
  window_switcher:
    type: yasb.window_switcher.WindowSwitcherWidget
    options:
      label: "<span>\uF2D2</span>"
      label_alt: ""
      icon_size: 48
      max_visible_apps: 5
      show_title: true
      callbacks:
        on_left: toggle_window_switcher
        on_middle: do_nothing
        on_right: do_nothing
      popup:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        dark_mode: true
      keybindings:
      - keys: alt+w
        action: toggle_window_switcher
        screen: cursor
  systray:
    type: yasb.systray.SystrayWidget
    options:
      class_name: systray
      label_collapsed: "▼"
      label_expanded: "▶"
      label_position: right
      pin_click_modifier: alt
      show_unpinned: true
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false
      icon_size: 16
      tooltip: true
      use_hook: false
      show_in_popup: true
      icons_per_row: 4
      popup:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: None
        alignment: center
        direction: down
        offset_top: 6
        offset_left: 0
      hide_icons: []
  microphone:
    type: yasb.microphone.MicrophoneWidget
    options:
      label: <span>{icon}</span>
      label_alt: <span>{icon}</span> {level}
      mute_text: mute
      icons:
        normal: "\uEC71"
        muted: "\uE720"
      mic_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: down
      callbacks:
        on_left: toggle_mic_menu
        on_middle: toggle_label
        on_right: toggle_mute
  media:
    type: yasb.media.MediaWidget
    options:
      label: '{title}{s}{artist}'
      label_alt: '{title}'
      separator: ' - '
      hide_empty: true
      callbacks:
        on_left: toggle_media_menu
        on_middle: do_nothing
        on_right: do_nothing
      max_field_size:
        label: 20
        label_alt: 20
      show_thumbnail: true
      controls_only: false
      controls_left: true
      controls_hide: true
      thumbnail_alpha: 100
      thumbnail_padding: 10
      thumbnail_edge_fade: true
      icons:
        prev_track: "\uE892"
        next_track: "\uE893"
        play: "\uE768"
        pause: "\uE769"
      media_menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: center
        direction: down
        thumbnail_corner_radius: 8
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 20
        show_volume_slider: true
      scrolling_label:
        enabled: true
        style: bounce
        update_interval_ms: 40
