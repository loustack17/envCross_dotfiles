# vim:fileencoding=utf-8:foldmethod=marker

include Eldritch-Dark.conf

# Font {{{

font_family      SF Mono Nerd Font
font_size 12.0
font_features none

# }}}

# Cursor {{{

cursor_shape beam
cursor_blink_interval 0

# }}}

# Performance {{{

sync_to_monitor no
scrollback_pager_history_size 50

# }}}

# Scrollback {{{

scrollback_lines 5000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# }}}

# Mouse {{{

mouse_hide_wait -3.0

# }}}

# Bell {{{

enable_audio_bell no

# }}}

# Window {{{

window_border_width 1pt
window_padding_width 8
hide_window_decorations titlebar-only

# }}}

# Tab {{{

tab_bar_edge top
tab_bar_min_tabs 2
tab_title_max_length 24
tab_bar_style powerline
tab_powerline_style round
tab_title_template "{title}"
active_tab_font_style bold
inactive_tab_font_style normal
tab_activity_symbol none
bell_on_tab no

# }}}

# Remote control {{{

allow_remote_control socket-only
listen_on unix:/tmp/kitty-socket

# }}}

# Keybindings {{{

map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down

map kitty_mod+z launch zellij
map kitty_mod+enter launch --cwd=current
map f5 launch --location=vsplit --cwd=current
map f6 launch --location=hsplit --cwd=current
map f7 layout_action rotate

map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window

map shift+up move_window up
map shift+left move_window left
map shift+right move_window right
map shift+down move_window down

map ctrl+shift+up layout_action move_to_screen_edge top
map ctrl+shift+left layout_action move_to_screen_edge left
map ctrl+shift+right layout_action move_to_screen_edge right
map ctrl+shift+down layout_action move_to_screen_edge bottom

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3
map ctrl+home resize_window reset

map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map kitty_mod+t new_tab
map kitty_mod+q close_tab

map ctrl+alt+t goto_layout tall
map ctrl+alt+s goto_layout stack

# }}}
